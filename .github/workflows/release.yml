name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure Turso credentials
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_TOKEN: ${{ secrets.DATABASE_TOKEN }}
        run: |
          printf 'DATABASE_URL=%s\nDATABASE_TOKEN=%s\n' "$DATABASE_URL" "$DATABASE_TOKEN" > .env.local

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Slate v__VERSION__
          releaseBody: |
            Install the update from Settings → Check for updates, or download the assets below.
          releaseDraft: false
          prerelease: false
          tauriScript: bun run tauri
          args: ""

  publish-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0" "ndk;27.2.12479018"
          NDK_DIR="$(ls -d "$ANDROID_HOME/ndk"/* | sort -V | tail -1)"
          echo "NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          echo "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Configure Turso credentials
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_TOKEN: ${{ secrets.DATABASE_TOKEN }}
        run: |
          printf 'DATABASE_URL=%s\nDATABASE_TOKEN=%s\n' "$DATABASE_URL" "$DATABASE_TOKEN" > .env.local

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: bash scripts/setup-android-signing.sh

      - name: Refresh Android launcher icons
        run: |
          bun run tauri icon src-tauri/icons/icon.png
          cat > src-tauri/gen/android/app/src/main/res/values/ic_launcher_background.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="ic_launcher_background">#000000</color>
          </resources>
          EOF

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Slate v__VERSION__
          releaseDraft: false
          prerelease: false
          tauriScript: bun run tauri
          mobile: android

      - name: Attach slate-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK="$(find src-tauri/gen/android/app/build/outputs/apk -name 'app-universal-release.apk' | head -1)"
          if [ -z "$APK" ]; then
            echo "No signed APK found to upload." >&2
            exit 1
          fi
          cp "$APK" slate-android.apk
          gh release upload "v$(node -p "require('./package.json').version")" slate-android.apk --clobber